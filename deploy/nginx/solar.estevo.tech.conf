server {
    listen 80;
    listen [::]:80;
    server_name solar.estevo.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name solar.estevo.tech;

    ssl_certificate /etc/letsencrypt/live/solar.estevo.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solar.estevo.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/solar.estevo.tech/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 20M;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Cache headers apenas para assets do Vite (esses existem como arquivo).
    # NÃO adicionar catch-all para .js/.css — quebra rotas dinâmicas do Livewire.
    location ~* ^/build/.+\.(css|js|woff2?|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
    }

    location ~ /\.(?!well-known).* { deny all; }
}
