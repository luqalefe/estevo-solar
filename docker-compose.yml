services:
  app:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-lp_solar}
      DB_USERNAME: ${DB_USERNAME:-lp_solar}
      DB_PASSWORD: ${DB_PASSWORD:-lp_solar}
      REDIS_HOST: redis
      REDIS_PORT: 6379

  queue:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    command: php artisan queue:listen --tries=3 --timeout=60
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-lp_solar}
      DB_USERNAME: ${DB_USERNAME:-lp_solar}
      DB_PASSWORD: ${DB_PASSWORD:-lp_solar}
      REDIS_HOST: redis
      REDIS_PORT: 6379

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-lp_solar}
      POSTGRES_USER: ${DB_USERNAME:-lp_solar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lp_solar}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-lp_solar} -d ${DB_DATABASE:-lp_solar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  db-data:
  redis-data:
